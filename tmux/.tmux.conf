set -g mouse on
set -g set-clipboard on
# Use backtick as the tmux prefix; press it twice to send a literal backtick.
unbind C-b
set -g prefix `
bind-key ` send-prefix

bind-key -T root MouseDown1Status select-window -t =
bind-key -T root MouseDown1StatusLeft choose-tree -Zs
bind-key -T root MouseDown3Status display-menu -T "#[align=centre]#{window_index}:#{window_name}" -t = -x W -y S "Swap Left" l "swap-window -t:-1" "Swap Right" r "swap-window -t:+1" "#{?pane_marked_set,,-}Swap Marked" s "swap-window" Kill X kill-window Respawn R "respawn-window -k" "#{?pane_marked,Unmark,Mark}" m "select-pane -m" Rename n "command-prompt -I \"#W\" \"rename-window -- '%%'\""

# Terminal and performance defaults for modern terminals.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm*:Tc"
set -ag terminal-overrides ",*256col*:Tc"
set -as terminal-features ",*:clipboard"
set -sg escape-time 0
set -g history-limit 50000

# Status line
set -g status-position bottom
set -g status-interval 1
set -g status-style bg=colour235,fg=colour136
set -g status-left-length 96
set -g status-left "#[fg=colour39,bold]🚀 #S #[fg=colour245]| #[bg=colour39,fg=colour235,bold] 🔥 pane #{pane_index} #[bg=default,fg=colour81] #{pane_current_command}"
set -g status-right-length 140
set -g status-right "#[fg=colour245]🖥 #(uname -s) #[fg=colour245]| #[fg=colour214]🧠 #($HOME/.config/tmux/status-cpu.sh) #[fg=colour245]| #[fg=colour111]📦 #($HOME/.config/tmux/status-memory.sh) #[fg=colour245]| #[fg=colour39]🗓️ %Y-%m-%d 周%a #[fg=colour81]⏰ %H:%M"

set -g window-status-style bg=#F3E8FF,fg=#6B21A8
set -g window-status-format "#[range=window|#{window_index}] #I:#W #[norange]"
set -g window-status-current-style bg=#D8B4FE,fg=#3B0764,bold
set -g window-status-current-format "#[range=window|#{window_index}]🎯 #I:#W #[norange]"
set -g window-status-separator "│"

set -g message-style bg=colour235,fg=colour166
set -g message-command-style bg=colour233,fg=colour166
set -g display-panes-time 2000
set -g display-panes-colour colour183
set -g display-panes-active-colour colour40
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39

# Session helpers
bind-key S choose-tree -Zs
bind-key C-s split-window -v -l 10 "tmux list-sessions -F '#{session_name} | #{session_windows} windows | #{?session_attached,attached,detached}' | column -t -s '|' | fzf --reverse --header 'Select Session' --preview 'tmux list-windows -t {1}' --preview-window=right:50% | awk '{print \$1}' | xargs tmux switch-client -t"
bind-key L switch-client -l
bind-key C-n command-prompt -p "New session name:" "new-session -s '%%'"
bind-key g display-panes
bind-key - split-window -v
bind-key '\' split-window -h

# Mouse wheel behavior and copy mode.
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind-key -T copy-mode WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode WheelDownPane send-keys -X scroll-down

# Prefer tmux's native clipboard path so remote SSH sessions use OSC 52 instead of X11 tools.
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-and-cancel
